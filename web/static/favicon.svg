<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Locus: a geometric locus curve — overlapping circles tracing a path -->
  <circle cx="16" cy="16" r="14" fill="#1a1a2e"/>
  <!-- Locus curve: three orbital rings at different angles -->
  <ellipse cx="16" cy="16" rx="10" ry="4" fill="none" stroke="#d4a855" stroke-width="1.5" opacity="0.9"/>
  <ellipse cx="16" cy="16" rx="10" ry="4" fill="none" stroke="#8ab4d4" stroke-width="1.5" opacity="0.7" transform="rotate(60 16 16)"/>
  <ellipse cx="16" cy="16" rx="10" ry="4" fill="none" stroke="#8bc6a8" stroke-width="1.5" opacity="0.7" transform="rotate(120 16 16)"/>
  <!-- Center point: the focus -->
  <circle cx="16" cy="16" r="2.5" fill="#d4a855"/>
</svg>
